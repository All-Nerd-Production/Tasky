<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário — POCKET</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--card2:#1f1f30;
  --accent:#7c6bff; /* Roxo do Calendário */
  --text:#f0f0f5;--muted:#8a8aab;--border:rgba(42,42,62,0.8);
  --btn:#22223a;--btn-h:#2e2e4a;--red:#ff4466;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-shrink:0;z-index:200;}
.back{color:var(--muted);text-decoration:none;font-family:'Space Mono',monospace;font-size:.8rem;transition:color .2s;}
.back:hover{color:var(--accent);}
.topbar-title{font-weight:700;font-size:1.1rem;display:flex;align-items:center;gap:0.5rem;}
.topbar-title span{color:var(--accent);}

/* Ícones Globais */
.svg-icon{width:1.2rem;height:1.2rem;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* MAIN LAYOUT */
.main{flex:1;display:flex;overflow:hidden;padding:1.5rem;}
.cal-layout{display:flex;gap:1.5rem;flex:1;width:100%;max-width:1400px;margin:0 auto;}
.cal-left{display:flex;flex-direction:column;gap:1rem;flex:1;min-width:0;}
.cal-right{width:320px;display:flex;flex-direction:column;gap:1rem;flex-shrink:0;}

/* HEADER E CONTROLES */
.cal-header{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem 1.5rem;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
.cal-nav{background:var(--btn);border:1px solid var(--border);border-radius:8px;padding:.4rem .8rem;color:var(--text);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.cal-nav:hover{background:var(--accent);color:#000;border-color:var(--accent);}
.cal-month{font-size:1.2rem;font-weight:700;}

/* MINI TOOLS */
.mini-tools{display:flex;gap:.5rem;flex-wrap:wrap;}
.mini-btn{display:flex;align-items:center;justify-content:center;gap:0.4rem;flex:1;min-width:80px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.6rem;font-size:.8rem;cursor:pointer;color:var(--muted);transition:all .2s;font-family:'Syne',sans-serif;}
.mini-btn:hover,.mini-btn.active{background:var(--btn-h);color:var(--text);border-color:var(--accent);}

/* CALENDAR GRID */
.cal-grid{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;flex:1;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
.cal-grid-header{display:grid;grid-template-columns:repeat(7,1fr);background:var(--card2);border-bottom:1px solid var(--border);}
.cal-grid-header div{padding:.8rem .5rem;text-align:center;font-size:.75rem;font-family:'Space Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
.cal-grid-body{display:grid;grid-template-columns:repeat(7,1fr);flex:1;grid-auto-rows:1fr;}
.cal-day{padding:.5rem;border-bottom:1px solid var(--border);border-right:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative;display:flex;flex-direction:column;gap:0.3rem;overflow:hidden;}
.cal-day:nth-child(7n){border-right:none;}
.cal-day:hover{background:var(--btn-h);}
.cal-day.other{opacity:.3;}
.cal-day.today .day-num{background:var(--accent);color:#000;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;}
.cal-day.selected{background:rgba(124,107,255,0.1);box-shadow:inset 0 0 0 1px var(--accent);}
.day-num{font-size:.85rem;font-weight:600;width:26px;height:26px;display:flex;align-items:center;justify-content:center;}
.day-events{display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto;}
.day-events::-webkit-scrollbar{width:3px;}
.day-events::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.ev-pill{font-size:.65rem;color:#fff;border-radius:4px;padding:2px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Space Mono',monospace;}

/* EVENT FORM */
.ev-form{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
.ev-form h3{display:flex;align-items:center;gap:0.5rem;font-size:.9rem;color:var(--accent);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.1em;}
.form-row{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.8rem;}
.form-row label{font-size:.7rem;color:var(--muted);font-family:'Space Mono',monospace;text-transform:uppercase;font-weight:700;}
.form-input, .form-select{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:.6rem .8rem;color:var(--text);font-family:'Syne',sans-serif;font-size:.9rem;outline:none;width:100%;transition:border-color .2s;}
.form-input:focus, .form-select:focus{border-color:var(--accent);}
.form-row2{display:flex;gap:.6rem;}
.form-row2 .form-row{flex:1;}
.add-btn{background:var(--accent);border:none;border-radius:8px;padding:.8rem;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;color:#000;cursor:pointer;width:100%;transition:all .2s;margin-top:.5rem;display:flex;align-items:center;justify-content:center;gap:0.4rem;}
.add-btn:hover{background:#9587ff;transform:translateY(-2px);}

/* EVENTS LIST */
.ev-list{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem;flex:1;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
.ev-list h3{font-size:.8rem;color:var(--muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.1em;margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:0.5rem;}
.ev-item{display:flex;align-items:flex-start;gap:.8rem;padding:.8rem;border-radius:10px;background:var(--card2);border:1px solid var(--border);margin-bottom:.6rem;transition:transform 0.1s;}
.ev-item:hover{border-color:var(--muted);}
.ev-item .ev-color{width:4px;border-radius:2px;align-self:stretch;flex-shrink:0;}
.ev-item .ev-info{flex:1;min-width:0;}
.ev-item .ev-title{font-size:.9rem;font-weight:600;margin-bottom:0.2rem;}
.ev-item .ev-meta{font-size:.75rem;color:var(--muted);font-family:'Space Mono',monospace;display:flex;align-items:center;gap:0.3rem;margin-bottom:0.2rem;}
.ev-item .ev-del{background:none;border:none;color:var(--muted);cursor:pointer;padding:0.2rem;transition:color .2s;display:flex;align-items:center;border-radius:6px;}
.ev-item .ev-del:hover{color:var(--red);background:rgba(255,68,102,0.1);}

/* MODAL BUSCA */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;display:none;backdrop-filter:blur(3px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:1.5rem;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 40px rgba(0,0,0,0.5);}
.modal h3{display:flex;align-items:center;justify-content:space-between;font-size:1rem;font-weight:700;margin-bottom:1.5rem;color:var(--accent);}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;padding:0.3rem;border-radius:6px;}
.modal-close:hover{color:var(--red);background:rgba(255,68,102,0.1);}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="back">← POCKET</a>
  <div class="topbar-title">
    <svg class="svg-icon" viewBox="0 0 24 24" style="stroke:var(--accent);">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
      <line x1="16" y1="2" x2="16" y2="6"></line>
      <line x1="8" y1="2" x2="8" y2="6"></line>
      <line x1="3" y1="10" x2="21" y2="10"></line>
    </svg>
    <span>Calendário</span>
  </div>
</div>

<div class="main">
  <div class="cal-layout">
    
    <div class="cal-left">
      <div class="mini-tools">
        <button class="mini-btn active" id="view-month" onclick="setView('month',this)">Mês</button>
        <button class="mini-btn" id="view-week" onclick="setView('week',this)">Semana</button>
        <button class="mini-btn" id="view-agenda" onclick="setView('agenda',this)">Lista</button>
        <button class="mini-btn" onclick="goToday()">Hoje</button>
        <button class="mini-btn" onclick="openSearch()">
          <svg class="svg-icon" viewBox="0 0 24 24" style="width:1rem;height:1rem;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          Buscar
        </button>
      </div>
      <div class="cal-header">
        <button class="cal-nav" onclick="calNav(-1)">
          <svg class="svg-icon" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div class="cal-month" id="calTitle"></div>
        <button class="cal-nav" onclick="calNav(1)">
          <svg class="svg-icon" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
      </div>
      <div id="cal-container" style="display:flex; flex-direction:column; flex:1; min-height:0;"></div>
    </div>
    
    <div class="cal-right">
      <div class="ev-form">
        <h3>
          <svg class="svg-icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Novo Evento
        </h3>
        <div class="form-row">
          <label>Título</label>
          <input class="form-input" id="ev-title" placeholder="Nome do evento">
        </div>
        <div class="form-row2">
          <div class="form-row">
            <label>Data</label>
            <input class="form-input" type="date" id="ev-date">
          </div>
          <div class="form-row">
            <label>Hora (Opcional)</label>
            <input class="form-input" type="time" id="ev-time">
          </div>
        </div>
        <div class="form-row2">
          <div class="form-row">
            <label>Cor</label>
            <input class="form-input" type="color" id="ev-color" value="#7c6bff" style="height:42px;padding:.2rem;cursor:pointer;">
          </div>
          <div class="form-row">
            <label>Repetir</label>
            <select class="form-select" id="ev-recur">
              <option value="none">Não repetir</option>
              <option value="daily">Todos os dias</option>
              <option value="weekly">Toda semana</option>
              <option value="monthly">Todo mês</option>
              <option value="yearly">Todo ano</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label>Anotações</label>
          <input class="form-input" id="ev-note" placeholder="Local, descrição, etc...">
        </div>
        <button class="add-btn" onclick="addEvent()">Salvar Evento</button>
      </div>
      
      <div class="ev-list">
        <h3 id="ev-list-title">Eventos de Hoje</h3>
        <div id="ev-list-body"></div>
      </div>
    </div>
    
  </div>
</div>

<div class="modal-overlay" id="search-modal">
  <div class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
      <h3 style="margin:0; display:flex; align-items:center; gap:0.5rem;">
        <svg class="svg-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg> 
        Buscar Eventos
      </h3>
      <button class="modal-close" onclick="closeSearch()">
        <svg class="svg-icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <input class="form-input" id="search-q" placeholder="Digite o título ou anotação..." oninput="searchEvents()" style="margin-bottom:1rem;">
    <div id="search-results"></div>
  </div>
</div>

<script>
/* Ícones SVGs reutilizáveis */
const trashSVG = '<svg class="svg-icon" viewBox="0 0 24 24" style="width:1rem;height:1rem;"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>';
const repeatSVG = '<svg class="svg-icon" viewBox="0 0 24 24" style="width:.9rem;height:.9rem;"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>';
const noteSVG = '<svg class="svg-icon" viewBox="0 0 24 24" style="width:.9rem;height:.9rem;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>';

/* ════════════════ LOCAL STORAGE ════════════════ */
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function loadLS(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch(e){return def;}}

/* ════════════════ CALENDÁRIO CORE ════════════════ */
let calView='month';
let calDate=new Date();
let events=loadLS('suite_events',[]);
let selectedDate=null;

const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function setView(v,btn){
  calView=v;
  document.querySelectorAll('.mini-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCal();
}

function goToday(){
  calDate=new Date();
  selectedDate=calDate.toISOString().split('T')[0];
  document.getElementById('ev-date').value=selectedDate;
  renderCal();
}

function calNav(d){
  if(calView==='month'){calDate.setMonth(calDate.getMonth()+d);}
  else if(calView==='week'){calDate.setDate(calDate.getDate()+d*7);}
  else if(calView==='agenda'){calDate.setMonth(calDate.getMonth()+d);}
  renderCal();
}

function getEventsForDate(dateStr){
  return events.filter(e=>{
    if(e.date===dateStr)return true;
    if(e.recur==='daily')return e.date<=dateStr;
    if(e.recur==='weekly'){const ed=new Date(e.date);const td=new Date(dateStr);return e.date<=dateStr&&(td-ed)%(7*86400000)===0;}
    if(e.recur==='monthly'){const ed=new Date(e.date);const td=new Date(dateStr);return ed.getDate()===td.getDate()&&e.date<=dateStr;}
    if(e.recur==='yearly'){const ed=new Date(e.date);const td=new Date(dateStr);return ed.getDate()===td.getDate()&&ed.getMonth()===td.getMonth()&&e.date<=dateStr;}
    return false;
  });
}

function renderCal(){
  const c=document.getElementById('cal-container');
  const t=document.getElementById('calTitle');
  const today=new Date();
  
  if(calView==='month'){
    t.textContent=`${MONTHS[calDate.getMonth()]} ${calDate.getFullYear()}`;
    const first=new Date(calDate.getFullYear(),calDate.getMonth(),1);
    const last=new Date(calDate.getFullYear(),calDate.getMonth()+1,0);
    const startDay=first.getDay();
    
    let html=`<div class="cal-grid"><div class="cal-grid-header">`;
    DAYS.forEach(d=>html+=`<div>${d}</div>`);
    html+=`</div><div class="cal-grid-body">`;
    
    const prev=new Date(calDate.getFullYear(),calDate.getMonth(),0);
    for(let i=startDay-1;i>=0;i--){
      html+=`<div class="cal-day other"><div class="day-num">${prev.getDate()-i}</div></div>`;
    }
    for(let d=1;d<=last.getDate();d++){
      const isToday=d===today.getDate()&&calDate.getMonth()===today.getMonth()&&calDate.getFullYear()===today.getFullYear();
      const dateStr=`${calDate.getFullYear()}-${String(calDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isSel=selectedDate===dateStr;
      const dayEvs=getEventsForDate(dateStr);
      
      let evHtml='<div class="day-events">';
      dayEvs.slice(0,4).forEach(e=>evHtml+=`<div class="ev-pill" style="background:${e.color||'var(--accent)'}">${e.time?e.time+' ':''}${e.title}</div>`);
      if(dayEvs.length>4)evHtml+=`<div class="ev-pill" style="background:var(--border); color:var(--text); text-align:center;">+${dayEvs.length-4}</div>`;
      evHtml+='</div>';
      
      html+=`<div class="cal-day${isToday?' today':''}${isSel?' selected':''}" onclick="selectDay('${dateStr}')"><div class="day-num">${d}</div>${evHtml}</div>`;
    }
    const rem=42-(startDay+last.getDate());
    for(let d=1;d<=rem;d++){
      if(rem > 6 && d > (rem-7) && (startDay+last.getDate()) <= 35 ) break; // Ajuste para não ter linha extra vazia
      html+=`<div class="cal-day other"><div class="day-num">${d}</div></div>`;
    }
    html+=`</div></div>`;
    c.innerHTML=html;
    
  } else if(calView==='week'){
    const wd=calDate.getDay();
    const weekStart=new Date(calDate);weekStart.setDate(calDate.getDate()-wd);
    const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);
    
    t.textContent=`${weekStart.getDate()} ${MONTHS[weekStart.getMonth()].substring(0,3)} — ${weekEnd.getDate()} ${MONTHS[weekEnd.getMonth()].substring(0,3)}`;
    
    let html=`<div class="cal-grid"><div class="cal-grid-header">`;
    for(let i=0;i<7;i++){
      const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);
      const isToday=d.getDate()===today.getDate()&&d.getMonth()===today.getMonth()&&d.getFullYear()===today.getFullYear();
      html+=`<div>${DAYS[i]} <span style="${isToday?'color:var(--accent);font-weight:700;':''}">${d.getDate()}</span></div>`;
    }
    html+=`</div><div class="cal-grid-body" style="grid-auto-rows: minmax(120px, 1fr);">`;
    
    for(let i=0;i<7;i++){
      const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);
      const ds=d.toISOString().split('T')[0];
      const isSel=selectedDate===ds;
      const evs=getEventsForDate(ds);
      
      let evHtml='<div class="day-events">';
      evs.forEach(e=>evHtml+=`<div class="ev-pill" style="background:${e.color||'var(--accent)'}; margin-bottom:4px; padding:4px 6px; white-space:normal; line-height:1.2;">${e.time?e.time+' - ':''}${e.title}</div>`);
      evHtml+='</div>';
      
      html+=`<div class="cal-day${isSel?' selected':''}" onclick="selectDay('${ds}')" style="border-bottom:none;">${evHtml}</div>`;
    }
    html+=`</div></div>`;
    c.innerHTML=html;
    
  } else if(calView==='agenda'){
    t.textContent=`Eventos Futuros`;
    const sorted=[...events].sort((a,b)=>a.date>b.date?1:-1);
    let html=`<div style="display:flex;flex-direction:column;gap:.8rem; overflow-y:auto; padding-right:5px;">`;
    
    if(sorted.length===0) html+=`<div style="color:var(--muted);font-size:.9rem;padding:2rem;text-align:center;background:var(--card);border-radius:14px;">Nenhum evento programado.</div>`;
    
    sorted.forEach(e=>{
      const dArr = e.date.split('-');
      const formatedDate = `${dArr[2]}/${dArr[1]}/${dArr[0]}`;
      html+=`<div style="background:var(--card);border:1px solid var(--border);border-left:4px solid ${e.color||'var(--accent)'};border-radius:12px;padding:1rem 1.2rem; display:flex; flex-direction:column; gap:0.4rem;">
        <div style="font-size:.75rem;color:var(--muted);font-family:'Space Mono',monospace;display:flex;gap:1rem;">
          <span>🗓️ ${formatedDate}</span>
          ${e.time?`<span>⏰ ${e.time}</span>`:''}
          ${e.recur!=='none'?`<span style="display:flex;align-items:center;gap:0.2rem;">${repeatSVG} Repete</span>`:''}
        </div>
        <div style="font-weight:700;font-size:1.1rem;">${e.title}</div>
        ${e.note?`<div style="font-size:.85rem;color:var(--muted);display:flex;align-items:flex-start;gap:0.4rem;margin-top:0.2rem;">${noteSVG} ${e.note}</div>`:''}
      </div>`;
    });
    html+=`</div>`;
    c.innerHTML=html;
  }
  renderEventList();
}

function selectDay(dateStr){
  selectedDate=dateStr;
  document.getElementById('ev-date').value=dateStr;
  renderCal();
  renderEventList(dateStr);
}

function addEvent(){
  const title=document.getElementById('ev-title').value.trim();
  if(!title){document.getElementById('ev-title').focus();return;}
  
  const ev={
    id:Date.now(),
    title,
    date:document.getElementById('ev-date').value || new Date().toISOString().split('T')[0],
    time:document.getElementById('ev-time').value,
    color:document.getElementById('ev-color').value,
    recur:document.getElementById('ev-recur').value,
    note:document.getElementById('ev-note').value
  };
  
  events.push(ev);
  saveLS('suite_events',events);
  
  // Limpar form
  document.getElementById('ev-title').value='';
  document.getElementById('ev-time').value='';
  document.getElementById('ev-note').value='';
  document.getElementById('ev-recur').value='none';
  
  renderCal();
}

function deleteEvent(id){
  events=events.filter(e=>e.id!==id);
  saveLS('suite_events',events);
  renderCal();
}

function renderEventList(dateStr){
  const listTitle=document.getElementById('ev-list-title');
  const listBody=document.getElementById('ev-list-body');
  let shown;
  
  if(dateStr){
    shown=getEventsForDate(dateStr);
    const dArr = dateStr.split('-');
    listTitle.textContent=`Dia ${dArr[2]}/${dArr[1]}/${dArr[0]}`;
  } else {
    const today=new Date().toISOString().split('T')[0];
    shown=getEventsForDate(today);
    listTitle.textContent='Eventos de Hoje';
  }
  
  if(!shown.length){
    listBody.innerHTML=`<div style="color:var(--muted);font-size:.8rem;padding:1rem 0;text-align:center;">Nenhum evento neste dia.</div>`;
    return;
  }
  
  listBody.innerHTML=shown.map(e=>`
    <div class="ev-item">
      <div class="ev-color" style="background:${e.color||'var(--accent)'}"></div>
      <div class="ev-info">
        <div class="ev-title">${e.title}</div>
        <div class="ev-meta">
          ${e.time?`<span>${e.time}</span>`:''} 
          ${e.recur!=='none'?`<span style="display:flex;align-items:center;gap:0.1rem;" title="Evento recorrente">${repeatSVG}</span>`:''}
        </div>
        ${e.note?`<div class="ev-meta" style="margin-top:0.3rem;">${e.note}</div>`:''}
      </div>
      <button class="ev-del" onclick="deleteEvent(${e.id})" title="Excluir evento">${trashSVG}</button>
    </div>
  `).join('');
}

/* ════════════════ MODAL DE BUSCA ════════════════ */
function openSearch(){
  document.getElementById('search-modal').classList.add('open');
  document.getElementById('search-q').focus();
}
function closeSearch(){
  document.getElementById('search-modal').classList.remove('open');
  document.getElementById('search-q').value='';
  document.getElementById('search-results').innerHTML='';
}
function searchEvents(){
  const q=document.getElementById('search-q').value.toLowerCase();
  const res=events.filter(e=>e.title.toLowerCase().includes(q)||e.note.toLowerCase().includes(q));
  const r=document.getElementById('search-results');
  
  if(!q){r.innerHTML='';return;}
  
  r.innerHTML=res.map(e=>{
    const dArr = e.date.split('-');
    return `
    <div class="ev-item" style="margin-bottom:.5rem" onclick="selectDay('${e.date}');closeSearch();" style="cursor:pointer;">
      <div class="ev-color" style="background:${e.color||'var(--accent)'}"></div>
      <div class="ev-info">
        <div class="ev-title">${e.title}</div>
        <div class="ev-meta">${dArr[2]}/${dArr[1]}/${dArr[0]} ${e.time?' · '+e.time:''}</div>
      </div>
    </div>`
  }).join('')||`<div style="color:var(--muted);font-size:.85rem;padding:1rem;text-align:center;">Nenhum evento encontrado.</div>`;
}

// Inicialização
const todayStr=new Date().toISOString().split('T')[0];
selectedDate=todayStr;
document.getElementById('ev-date').value=todayStr;
renderCal();
</script>
