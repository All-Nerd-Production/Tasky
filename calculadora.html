<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora — POCKET</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--card2:#1f1f30;
  --accent:#ff6b35;--accent2:#ffaa00;--text:#f0f0f5;--muted:#6b6b8a;
  --border:#2a2a3e;--btn:#22223a;--btn-h:#2e2e4a;--green:#00d4aa;--red:#ff4466;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100;}
.back{color:var(--muted);text-decoration:none;font-family:'Space Mono',monospace;font-size:.8rem;transition:color .2s;}
.back:hover{color:var(--accent);}
.topbar-title{font-weight:700;font-size:1.1rem;color:var(--text);display:flex;align-items:center;}
.topbar-title span{color:var(--accent);}
.tabs{display:flex;gap:.3rem;margin-left:auto;flex-wrap:wrap;}
.tab{padding:.4rem .9rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:.78rem;cursor:pointer;transition:all .2s;}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.tab:hover:not(.active){background:var(--btn-h);color:var(--text);}
.main{flex:1;display:flex;gap:0;overflow:hidden;height:calc(100vh - 55px);}
.panel{display:none;flex:1;overflow-y:auto;padding:1.5rem;}
.panel.active{display:flex;flex-direction:column;}

/* ─── COMUM ─── */
.calc-wrap{max-width:380px;margin:0 auto;width:100%;}
.display{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.2rem 1.5rem;margin-bottom:1rem;min-height:110px;display:flex;flex-direction:column;justify-content:flex-end;}
.display .expr{font-family:'Space Mono',monospace;font-size:.85rem;color:var(--muted);min-height:1.2em;word-break:break-all;text-align:right;}
.display .result{font-family:'Space Mono',monospace;font-size:2.6rem;font-weight:700;text-align:right;word-break:break-all;line-height:1.1;color:var(--text);}
.display .result.big{font-size:1.8rem;}
.keypad{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;}
.key{background:var(--btn);border:1px solid var(--border);border-radius:12px;padding:0;height:60px;font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;user-select:none;}
.key:active{transform:scale(.95);}
.key:hover{background:var(--btn-h);}
.key.op{color:var(--accent);}
.key.eq{background:var(--accent);color:#fff;border-color:var(--accent);}
.key.eq:hover{background:#ff8552;}
.key.fn{color:var(--accent2);font-size:.85rem;}
.key.clr{color:var(--red);}
.key.span2{grid-column:span 2;}

/* ─── CIENTÍFICA ─── */
.sci-wrap{max-width:520px;margin:0 auto;width:100%;}
.sci-keypad{display:grid;grid-template-columns:repeat(5,1fr);gap:.4rem;}
.key.sm{font-size:.78rem;height:52px;}

/* ─── CONVERSÃO ─── */
.conv-wrap{max-width:600px;margin:0 auto;width:100%;}
.conv-categories{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.2rem;}
.conv-cat{padding:.35rem .8rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.75rem;cursor:pointer;transition:all .2s;font-family:'Syne',sans-serif;}
.conv-cat.active{background:var(--green);border-color:var(--green);color:#000;font-weight:700;}
.conv-cat:hover:not(.active){background:var(--btn-h);color:var(--text);}
.conv-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;}
.conv-row{display:flex;gap:1rem;align-items:center;margin-bottom:1rem;}
.conv-field{flex:1;display:flex;flex-direction:column;gap:.4rem;}
.conv-field label{font-size:.72rem;color:var(--muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.1em;}
.conv-input{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:.7rem 1rem;font-family:'Space Mono',monospace;font-size:1.2rem;color:var(--text);outline:none;width:100%;transition:border-color .2s;}
.conv-input:focus{border-color:var(--green);}
.conv-select{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:.7rem 1rem;font-family:'Syne',sans-serif;font-size:.9rem;color:var(--text);outline:none;width:100%;cursor:pointer;}
.swap-btn{background:var(--btn);border:1px solid var(--border);border-radius:10px;padding:.7rem;cursor:pointer;color:var(--text);font-size:1.2rem;transition:all .3s;flex-shrink:0;align-self:flex-end;margin-bottom:.4rem;display:flex;align-items:center;justify-content:center;}
.swap-btn:hover{background:var(--btn-h);transform:rotate(180deg);}
.conv-formula{background:var(--card2);border-radius:8px;padding:.6rem 1rem;font-family:'Space Mono',monospace;font-size:.75rem;color:var(--muted);margin-top:.5rem;}

/* ─── EQUAÇÕES E BUILDER ─── */
.eq-wrap{max-width:640px;margin:0 auto;width:100%;}
.eq-categories{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.2rem;}
.eq-list{display:grid;gap:.8rem;}
.eq-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;}
.eq-card:hover{border-color:var(--accent2);}
.eq-card.open{border-color:var(--accent2);}
.eq-header{padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between;}
.eq-name{font-weight:600;font-size:.95rem;}
.eq-formula{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--accent2);word-break:break-all;max-width:75%;}
.eq-chevron{color:var(--muted);transition:transform .2s;}
.eq-card.open .eq-chevron{transform:rotate(180deg);}
.eq-body{display:none;padding:0 1.2rem 1.2rem;border-top:1px solid var(--border);}
.eq-card.open .eq-body{display:block;}
.eq-inputs{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.6rem;margin-top:.8rem;}
.eq-input-group{display:flex;flex-direction:column;gap:.3rem;}
.eq-input-group label{font-size:.7rem;color:var(--muted);font-family:'Space Mono',monospace;text-transform:uppercase;font-weight:700;}
.eq-input-group input, .eq-input-group select{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:.6rem .8rem;font-family:'Space Mono',monospace;font-size:0.95rem;color:var(--text);outline:none;width:100%;transition:border-color .2s;}
.eq-input-group input:focus, .eq-input-group select:focus{border-color:var(--accent2);}
.eq-calc-btn{margin-top:.8rem;background:var(--accent2);border:none;border-radius:8px;padding:.6rem 1.2rem;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;color:#000;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:.4rem;}
.eq-calc-btn:hover{background:#ffcc00;}
.eq-result{margin-top:.6rem;background:var(--card2);border-radius:8px;padding:.8rem 1rem;font-family:'Space Mono',monospace;font-size:.95rem;color:var(--green);word-break:break-all;border-left:4px solid var(--green);}
.section-title{font-size:.75rem;color:var(--muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.15em;margin-bottom:.8rem;display:flex;align-items:center;gap:0.5rem;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* BUILDER */
.builder-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:2.5rem;box-shadow:0 10px 30px rgba(0,0,0,0.2);}
.b-step{background:var(--surface);border-radius:12px;padding:1.2rem;margin-bottom:1rem;border:1px solid var(--border);}
.b-step-title{font-size:0.85rem;color:var(--accent2);font-weight:700;margin-bottom:1rem;text-transform:uppercase;letter-spacing:0.05em;}
.b-display-wrap{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1rem;transition:border-color 0.2s;display:flex;align-items:center;}
.b-display-wrap:focus-within{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(255,170,0,0.1);}
.b-display-input{background:transparent;border:none;color:var(--accent2);font-family:'Space Mono',monospace;font-size:1.4rem;width:100%;outline:none;}
.b-display-input::placeholder{color:var(--muted);opacity:0.5;font-size:1.1rem;}
.b-keypad{display:grid;grid-template-columns:repeat(6,1fr);gap:0.4rem;background:var(--card2);padding:0.8rem;border-radius:12px;border:1px solid var(--border);}
.b-keypad button{background:var(--btn);border:1px solid var(--border);color:var(--text);padding:0.6rem 0;border-radius:8px;font-family:'Space Mono',monospace;font-size:1rem;cursor:pointer;transition:all 0.1s;}
.b-keypad button:hover{background:var(--btn-h);transform:translateY(-1px);}
.b-keypad button:active{transform:translateY(1px);}
.b-keypad button.op{color:var(--accent);}
.b-keypad button.func{color:var(--accent2);font-size:0.85rem;}
.b-var-creation{display:flex;gap:0.5rem;align-items:flex-end;flex-wrap:wrap;}
.b-var-list{display:flex;gap:0.5rem;flex-wrap:wrap;padding-top:1rem;margin-top:1rem;border-top:1px dashed var(--border);}
.var-pill-wrap{display:inline-flex;align-items:stretch;background:rgba(0,212,170,0.1);border:1px solid var(--green);border-radius:8px;overflow:hidden;transition:transform 0.1s;}
.var-pill-wrap:hover{transform:scale(1.05);}
.var-pill{background:none;border:none;color:var(--green);padding:0.4rem 0.8rem;cursor:pointer;font-family:'Space Mono',monospace;font-size:0.9rem;font-weight:700;}
.var-pill:hover{background:var(--green);color:#000;}
.var-pill-del{background:none;border:none;border-left:1px solid rgba(0,212,170,0.3);color:var(--red);padding:0 0.5rem;cursor:pointer;}
.var-pill-del:hover{background:rgba(255,68,102,0.2);}
.svg-icon{width:1.2rem;height:1.2rem;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="back">← SUITE</a>
  <div class="topbar-title">
    <svg class="svg-icon" viewBox="0 0 24 24" style="stroke:var(--accent); margin-right:0.4rem;">
      <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
      <line x1="8" y1="6" x2="16" y2="6"></line>
      <line x1="16" y1="14" x2="16" y2="14"></line>
      <line x1="16" y1="10" x2="16" y2="10"></line>
      <line x1="16" y1="18" x2="16" y2="18"></line>
      <line x1="12" y1="14" x2="12" y2="14"></line>
      <line x1="12" y1="10" x2="12" y2="10"></line>
      <line x1="12" y1="18" x2="12" y2="18"></line>
      <line x1="8" y1="14" x2="8" y2="14"></line>
      <line x1="8" y1="10" x2="8" y2="10"></line>
      <line x1="8" y1="18" x2="8" y2="18"></line>
    </svg>
    <span>Calculadora</span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchPanel('comum')">Comum</button>
    <button class="tab" onclick="switchPanel('cientifica')">Científica</button>
    <button class="tab" onclick="switchPanel('conversao')">Conversão</button>
    <button class="tab" onclick="switchPanel('equacoes')">Equações</button>
  </div>
</div>
<div class="main">

<div class="panel active" id="panel-comum">
<div class="calc-wrap">
  <div class="display">
    <div class="expr" id="c-expr"></div>
    <div class="result" id="c-result">0</div>
  </div>
  <div class="keypad">
    <button class="key fn" onclick="cKey('Math.abs(')">|x|</button>
    <button class="key fn" onclick="cKey('%')">%</button>
    <button class="key fn" onclick="cToggleSign()">±</button>
    <button class="key clr" onclick="cClear()">C</button>

    <button class="key fn" onclick="cKey('Math.sqrt(')">√</button>
    <button class="key fn" onclick="cKey('**2')">x²</button>
    <button class="key fn" onclick="cKey('**')">xⁿ</button>
    <button class="key op" onclick="cKey('÷')">÷</button>

    <button class="key" onclick="cKey('7')">7</button>
    <button class="key" onclick="cKey('8')">8</button>
    <button class="key" onclick="cKey('9')">9</button>
    <button class="key op" onclick="cKey('×')">×</button>

    <button class="key" onclick="cKey('4')">4</button>
    <button class="key" onclick="cKey('5')">5</button>
    <button class="key" onclick="cKey('6')">6</button>
    <button class="key op" onclick="cKey('-')">−</button>

    <button class="key" onclick="cKey('1')">1</button>
    <button class="key" onclick="cKey('2')">2</button>
    <button class="key" onclick="cKey('3')">3</button>
    <button class="key op" onclick="cKey('+')">+</button>

    <button class="key span2" onclick="cKey('0')">0</button>
    <button class="key" onclick="cKey('.')">.</button>
    <button class="key eq" onclick="cCalc()">=</button>
  </div>
</div>
</div>

<div class="panel" id="panel-cientifica">
<div class="sci-wrap">
  <div class="display">
    <div class="expr" id="s-expr"></div>
    <div class="result" id="s-result">0</div>
  </div>
  <div class="sci-keypad" id="sci-keypad">
    <button class="key sm fn" onclick="sKey('Math.sin(')">sin</button>
    <button class="key sm fn" onclick="sKey('Math.cos(')">cos</button>
    <button class="key sm fn" onclick="sKey('Math.tan(')">tan</button>
    <button class="key sm fn" onclick="sKey('Math.log10(')">log</button>
    <button class="key sm fn" onclick="sKey('Math.log(')">ln</button>
    <button class="key sm fn" onclick="sKey('Math.asin(')">asin</button>
    <button class="key sm fn" onclick="sKey('Math.acos(')">acos</button>
    <button class="key sm fn" onclick="sKey('Math.atan(')">atan</button>
    <button class="key sm fn" onclick="sKey('10**')">10ˣ</button>
    <button class="key sm fn" onclick="sKey('Math.exp(')">eˣ</button>
    <button class="key sm fn" onclick="sKey('Math.sqrt(')">√</button>
    <button class="key sm fn" onclick="sKey('Math.cbrt(')">∛</button>
    <button class="key sm fn" onclick="sKey('**2')">x²</button>
    <button class="key sm fn" onclick="sKey('**3')">x³</button>
    <button class="key sm fn" onclick="sKey('**')">xⁿ</button>
    <button class="key sm fn" onclick="sKey('Math.PI')">π</button>
    <button class="key sm fn" onclick="sKey('Math.E')">e</button>
    <button class="key sm fn" onclick="sKey('1/')">1/x</button>
    <button class="key sm fn" onclick="sKey('Math.abs(')">|x|</button>
    <button class="key sm fn" onclick="sKey('Math.factorial(')">n!</button>
    <button class="key sm fn" onclick="sKey('(')">( </button>
    <button class="key sm fn" onclick="sKey(')')"> )</button>
    <button class="key sm fn" onclick="sKey('%')">mod</button>
    <button class="key sm fn" onclick="sToggleRad()" id="rad-btn">DEG</button>
    <button class="key sm clr" onclick="sClear()">C</button>
    <button class="key sm" onclick="sKey('7')">7</button>
    <button class="key sm" onclick="sKey('8')">8</button>
    <button class="key sm" onclick="sKey('9')">9</button>
    <button class="key sm clr" onclick="sDel()">⌫</button>
    <button class="key sm op" onclick="sKey('÷')">÷</button>
    <button class="key sm" onclick="sKey('4')">4</button>
    <button class="key sm" onclick="sKey('5')">5</button>
    <button class="key sm" onclick="sKey('6')">6</button>
    <button class="key sm op" onclick="sKey('×')">×</button>
    <button class="key sm op" onclick="sKey('-')">−</button>
    <button class="key sm" onclick="sKey('1')">1</button>
    <button class="key sm" onclick="sKey('2')">2</button>
    <button class="key sm" onclick="sKey('3')">3</button>
    <button class="key sm op" onclick="sKey('+')">+</button>
    <button class="key sm eq" onclick="sCalc()" style="grid-row:span 2">=</button>
    <button class="key sm" style="grid-column:span 2" onclick="sKey('0')">0</button>
    <button class="key sm" onclick="sKey('.')">.</button>
    <button class="key sm fn" onclick="sKey('Math.PI*')">π×</button>
  </div>
</div>
</div>

<div class="panel" id="panel-conversao">
<div class="conv-wrap">
  <div class="section-title">Selecione a categoria</div>
  <div class="conv-categories" id="conv-cats"></div>
  <div class="conv-box">
    <div class="conv-row">
      <div class="conv-field">
        <label>Valor</label>
        <input class="conv-input" type="number" id="conv-in" oninput="doConvert()" placeholder="0">
        <select class="conv-select" id="conv-from" onchange="doConvert()"></select>
      </div>
      <button class="swap-btn" onclick="swapConv()" title="Inverter">
        <svg class="svg-icon" viewBox="0 0 24 24">
          <polyline points="17 1 21 5 17 9"></polyline>
          <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
          <polyline points="7 23 3 19 7 15"></polyline>
          <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
        </svg>
      </button>
      <div class="conv-field">
        <label>Resultado</label>
        <input class="conv-input" type="number" id="conv-out" oninput="doConvertReverse()" placeholder="0">
        <select class="conv-select" id="conv-to" onchange="doConvert()"></select>
      </div>
    </div>
    <div class="conv-formula" id="conv-formula"></div>
  </div>
</div>
</div>

<div class="panel" id="panel-equacoes">
<div class="eq-wrap">
  
  <div class="builder-box">
    <div class="section-title" style="color:var(--accent2); border:none; margin-bottom:1rem; font-size:0.9rem;">
      <svg class="svg-icon" viewBox="0 0 24 24" style="margin-right:0.4rem; width:1.3rem; height:1.3rem;">
        <path d="M12 2l3 7 7 3-7 3-3 7-3-7-7-3 7-3z"></path>
      </svg>
      Novo Construtor de Fórmulas
    </div>
    
    <div class="b-step">
      <div class="b-step-title">1. Informações Básicas</div>
      <div style="display:flex; gap:1rem; flex-wrap:wrap;">
        <div class="eq-input-group" style="flex:2; min-width:200px;">
          <label>Nome da Fórmula</label>
          <input type="text" id="b-name" placeholder="Ex: Energia de Einstein">
        </div>
        <div class="eq-input-group" style="flex:1; min-width:150px;">
          <label>Categoria</label>
          <select id="b-cat">
            <option value="Personalizadas">Personalizadas</option>
            <option value="Física">Física</option>
            <option value="Matemática">Matemática</option>
            <option value="Química">Química</option>
          </select>
        </div>
      </div>
    </div>

    <div class="b-step">
      <div class="b-step-title">2. Quais variáveis você vai usar?</div>
      <div class="b-var-creation">
        <div class="eq-input-group" style="flex:1; min-width:100px;">
          <label>Símbolo (ex: x)</label>
          <input type="text" id="b-var-sym" placeholder="m">
        </div>
        <div class="eq-input-group" style="flex:2; min-width:150px;">
          <label>Nome (ex: Massa)</label>
          <input type="text" id="b-var-lbl" placeholder="Massa (kg)">
        </div>
        <button class="eq-calc-btn" onclick="addBuilderVar()" style="margin-top:0; padding:0.6rem 1.2rem; align-self:flex-end;">Adicionar</button>
      </div>
      <div class="b-var-list" id="b-var-list">
        <span style="color:var(--muted); font-size:0.8rem; font-family:'Space Mono',monospace;">Nenhuma variável criada ainda.</span>
      </div>
    </div>

    <div class="b-step" style="margin-bottom:0; border-bottom-left-radius:0; border-bottom-right-radius:0; border-bottom:none;">
      <div class="b-step-title">3. Digite ou monte a Equação</div>
      
      <div class="b-display-wrap">
        <input type="text" id="b-display-input" class="b-display-input" placeholder="Clique aqui e digite a fórmula..." autocomplete="off">
      </div>

      <div class="b-keypad">
        <button class="func" onclick="bInsert('Math.sin(')">sin(</button>
        <button class="func" onclick="bInsert('Math.cos(')">cos(</button>
        <button class="func" onclick="bInsert('Math.tan(')">tan(</button>
        <button onclick="bInsert('(')">(</button>
        <button onclick="bInsert(')')">)</button>
        <button class="op" onclick="bInsert('/')">÷</button>
        
        <button onclick="bInsert('7')">7</button>
        <button onclick="bInsert('8')">8</button>
        <button onclick="bInsert('9')">9</button>
        <button class="func" onclick="bInsert('Math.sqrt(')">√</button>
        <button class="func" onclick="bInsert('**2')">x²</button>
        <button class="op" onclick="bInsert('*')">×</button>

        <button onclick="bInsert('4')">4</button>
        <button onclick="bInsert('5')">5</button>
        <button onclick="bInsert('6')">6</button>
        <button class="func" onclick="bInsert('Math.log10(')">log(</button>
        <button class="func" onclick="bInsert('**')">^</button>
        <button class="op" onclick="bInsert('-')">-</button>

        <button onclick="bInsert('1')">1</button>
        <button onclick="bInsert('2')">2</button>
        <button onclick="bInsert('3')">3</button>
        <button class="func" onclick="bInsert('Math.PI')">π</button>

function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

let cExpr='', cJustCalc=false;
function cKey(v){
  if(cJustCalc && v.match(/[0-9.]/)){cExpr='';cJustCalc=false;}
  else if(cJustCalc){cJustCalc=false;}
  cExpr+=v;
  document.getElementById('c-result').textContent=cExpr||'0';
  document.getElementById('c-result').className='result'+(cExpr.length>14?' big':'');
  document.getElementById('c-expr').textContent='';
}
function cClear(){cExpr='';document.getElementById('c-result').textContent='0';document.getElementById('c-expr').textContent='';}
function cToggleSign(){if(cExpr&&!cExpr.startsWith('-'))cExpr='-'+cExpr;else cExpr=cExpr.slice(1);}
function cCalc(){
  try{
    let ex=cExpr.replace(/÷/g,'/').replace(/×/g,'*');
    ex=ex.replace(/[+\-*/]$/,'');
    let opens=(ex.match(/\(/g)||[]).length-(ex.match(/\)/g)||[]).length;
    ex+=')'.repeat(opens<0?0:opens);
    let res=Function('"use strict";return ('+ex+')')();
    document.getElementById('c-expr').textContent=cExpr+' =';
    let disp=+res.toFixed(10)+'';
    document.getElementById('c-result').textContent=disp;
    document.getElementById('c-result').className='result'+(disp.length>14?' big':'');
    cExpr=disp; cJustCalc=true;
  }catch(e){document.getElementById('c-result').textContent='Erro';}
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('panel-comum').classList.contains('active')){
    if(e.key>='0'&&e.key<='9'||e.key==='.')cKey(e.key);
    if(e.key==='+'||e.key==='-')cKey(e.key);
    if(e.key==='*')cKey('×');
    if(e.key==='/')cKey('÷');
    if(e.key==='Enter'||e.key==='=')cCalc();
    if(e.key==='Escape')cClear();
  }
});

let sExpr='', sRad=false, sJustCalc=false;
Math.factorial=n=>{if(n<0)return NaN;if(n===0||n===1)return 1;let r=1;for(let i=2;i<=n;i++)r*=i;return r;}
function sKey(v){
  if(sJustCalc&&v.match(/^[0-9.]/)){sExpr='';sJustCalc=false;}
  else if(sJustCalc){sJustCalc=false;}
  sExpr+=v;
  document.getElementById('s-result').textContent=sExpr||'0';
  document.getElementById('s-expr').textContent='';
}
function sDel(){sExpr=sExpr.slice(0,-1);document.getElementById('s-result').textContent=sExpr||'0';}
function sClear(){sExpr='';document.getElementById('s-result').textContent='0';document.getElementById('s-expr').textContent='';}
function sToggleRad(){sRad=!sRad;document.getElementById('rad-btn').textContent=sRad?'RAD':'DEG';}
function sCalc(){
  try{
    let ex=sExpr.replace(/÷/g,'/').replace(/×/g,'*');
    if(!sRad){
      ex=ex.replace(/Math\.(sin|cos|tan)\(/g,(m,f)=>`Math.${f}(`);
      ex=ex.replace(/Math\.(sin|cos|tan)\(([^)]+)\)/g,(m,f,v)=>`Math.${f}(${v}*Math.PI/180)`);
    }
    let opens=(ex.match(/\(/g)||[]).length-(ex.match(/\)/g)||[]).length;
    ex+=')'.repeat(opens<0?0:opens);
    let res=Function('"use strict";return ('+ex+')')();
    document.getElementById('s-expr').textContent=sExpr+' =';
    let disp=+res.toFixed(10)+'';
    document.getElementById('s-result').textContent=disp;
    sExpr=disp; sJustCalc=true;
  }catch(e){document.getElementById('s-result').textContent='Erro';}
}

const convCats=Object.keys(convData);
let currentCat=convCats[0];
function initConv(){
  const catsEl=document.getElementById('conv-cats');
  convCats.forEach(c=>{
    const b=document.createElement('button');
    b.className='conv-cat'+(c===currentCat?' active':'');
    b.textContent=c;
    b.onclick=()=>{currentCat=c;document.querySelectorAll('.conv-cat').forEach(x=>x.classList.remove('active'));b.classList.add('active');populateSelects();};
    catsEl.appendChild(b);
  });
  populateSelects();
}
function populateSelects(){
  const cat=convData[currentCat];
  const units=cat.special?cat.units:Object.keys(cat.units);
  ['conv-from','conv-to'].forEach((id,i)=>{
    const sel=document.getElementById(id);
    sel.innerHTML='';
    units.forEach((u,j)=>{
      const o=document.createElement('option');o.value=u;o.textContent=u;
      if(i===0&&j===0)o.selected=true;
      if(i===1&&j===1)o.selected=true;
      sel.appendChild(o);
    });
  });
  document.getElementById('conv-in').value='';
  document.getElementById('conv-out').value='';
  document.getElementById('conv-formula').textContent='';
}
function convertValue(val,from,to,cat){
  const d=convData[cat];
  if(d.special){
    let c;
    if(from==='°C')c=val;
    else if(from==='°F')c=(val-32)*5/9;
    else if(from==='K')c=val-273.15;
    else if(from==='°R')c=(val-491.67)*5/9;
    if(to==='°C')return c;
    if(to==='°F')return c*9/5+32;
    if(to==='K')return c+273.15;
    if(to==='°R')return (c+273.15)*9/5;
  }
  if(cat==='Combustível'){
    if(from==='L/100km'||to==='L/100km'){
      if(from==='L/100km'&&to==='km/L')return 100/val;
      if(from==='km/L'&&to==='L/100km')return 100/val;
      return val;
    }
  }
  const base=val/d.units[from];
  return base*d.units[to];
}
function doConvert(){
  const v=parseFloat(document.getElementById('conv-in').value);
  const from=document.getElementById('conv-from').value;
  const to=document.getElementById('conv-to').value;
  if(isNaN(v)){document.getElementById('conv-out').value='';return;}
  const res=convertValue(v,from,to,currentCat);
  document.getElementById('conv-out').value=+res.toFixed(8);
  document.getElementById('conv-formula').textContent=`${v} ${from} = ${+res.toFixed(8)} ${to}`;
}
function doConvertReverse(){
  const v=parseFloat(document.getElementById('conv-out').value);
  const from=document.getElementById('conv-to').value;
  const to=document.getElementById('conv-from').value;
  if(isNaN(v)){document.getElementById('conv-in').value='';return;}
  const res=convertValue(v,from,to,currentCat);
  document.getElementById('conv-in').value=+res.toFixed(8);
  document.getElementById('conv-formula').textContent=`${v} ${from} = ${+res.toFixed(8)} ${to}`;
}
function swapConv(){
  const f=document.getElementById('conv-from');
  const t=document.getElementById('conv-to');
  const tmp=f.value;f.value=t.value;t.value=tmp;
  doConvert();
}

let eqData={};
let curEqCat='Personalizadas';
let builderVars = []; 

function bInsert(val) {
  const input = document.getElementById('b-display-input');
  input.focus();
  const start = input.selectionStart;
  const end = input.selectionEnd;
  const text = input.value;
  input.value = text.substring(0, start) + val + text.substring(end);
  input.selectionStart = input.selectionEnd = start + val.length;
}

function bClear() {
  const input = document.getElementById('b-display-input');
  input.value = '';
  input.focus();
}

function addBuilderVar() {
  const sym = document.getElementById('b-var-sym').value.trim();
  const lbl = document.getElementById('b-var-lbl').value.trim();
  
  if(!sym) { alert('Digite um símbolo para a variável (ex: x, m, v).'); return; }
  if(!/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(sym)) {
    alert('O símbolo da variável deve conter apenas letras e números, sem espaços e não pode começar com número.');
    return;
  }
  if(builderVars.find(v => v.id === sym)) {
    alert('Você já adicionou uma variável com esse símbolo.');
    return;
  }
  
  builderVars.push({ id: sym, label: lbl || sym });
  document.getElementById('b-var-sym').value = '';
  document.getElementById('b-var-lbl').value = '';
  renderBuilderVars();
}

function renderBuilderVars() {
  const c = document.getElementById('b-var-list');
  c.innerHTML = '';
  if(builderVars.length === 0) {
    c.innerHTML = '<span style="color:var(--muted); font-size:0.8rem; font-family:\'Space Mono\',monospace;">Nenhuma variável criada ainda.</span>';
    return;
  }
  
  builderVars.forEach((v, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'var-pill-wrap';
    
    const btn = document.createElement('button');
    btn.className = 'var-pill';
    btn.textContent = `[ ${v.id} ]`;
    btn.title = `Adicionar ${v.label} à fórmula`;
    btn.onclick = () => bInsert(v.id);
    
    const delBtn = document.createElement('button');
    delBtn.className = 'var-pill-del';
    delBtn.textContent = '✕';
    delBtn.title = `Excluir variável`;
    delBtn.onclick = () => {
      builderVars.splice(idx, 1);
      renderBuilderVars();
    };
    
    wrap.appendChild(btn);
    wrap.appendChild(delBtn);
    c.appendChild(wrap);
  });
}

function saveBuiltEquation() {
  const name = document.getElementById('b-name').value.trim();
  const cat = document.getElementById('b-cat').value;
  const expr = document.getElementById('b-display-input').value.trim();
  
  if(!name) { alert('Dê um nome para a sua fórmula no Passo 1!'); return; }
  if(!expr) { alert('A equação está vazia no Passo 3. Digite ou monte-a.'); return; }
  if(builderVars.length === 0) { 
    if(!confirm('Você não criou nenhuma variável no Passo 2. Esta fórmula será apenas um cálculo estático. Deseja continuar?')) return;
  }
  
  const varsArray = builderVars.map(v => ({ id: v.id, label: v.label }));
  
  const newEq = {
    name: name,
    formula: expr,
    expr: expr,
    vars: varsArray,
    category: cat,
    custom: true,
    id: Date.now()
  };
  
  let customEqs = loadLS('suite_custom_equations', []);
  customEqs.push(newEq);
  saveLS('suite_custom_equations', customEqs);
  
  document.getElementById('b-name').value = '';
  document.getElementById('b-display-input').value = '';
  builderVars = [];
  renderBuilderVars();
  
  curEqCat = cat;
  initEq();
  
  document.getElementById('eq-list').scrollIntoView({ behavior: 'smooth' });
}

    'Personalizadas': []
  };

  eqData = baseEqData;
  let customEqs = loadLS('suite_custom_equations', []);
  customEqs.forEach(eq => {
    if (!eqData[eq.category]) eqData[eq.category] = [];
    eqData[eq.category].push(eq);
  });
}

function initEqCategories() {
  const catsEl=document.getElementById('eq-cats');
  catsEl.innerHTML = '';
  const eqCats=Object.keys(eqData);
  if(!curEqCat || !eqCats.includes(curEqCat)) curEqCat=eqCats[0];
  
  eqCats.forEach(c=>{
    if (eqData[c].length === 0 && c !== 'Personalizadas') return;
    const b=document.createElement('button');
    b.className='conv-cat'+(c===curEqCat?' active':'');
    b.textContent=c;
    b.onclick=()=>{
      curEqCat=c;
      document.querySelectorAll('#eq-cats .conv-cat').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      renderEqs();
    };
    catsEl.appendChild(b);
  });
}

function renderEqs(){
  const list=document.getElementById('eq-list');list.innerHTML='';
  if (!eqData[curEqCat] || eqData[curEqCat].length === 0) {
    list.innerHTML = `<div style="color:var(--muted); font-size:.85rem; padding: 1rem 0;">Nenhuma fórmula cadastrada nesta categoria.</div>`;
    return;
  }
  
  eqData[curEqCat].forEach((eq,idx)=>{
    const card=document.createElement('div');card.className='eq-card';card.id='eq-'+idx;
    const vars=eq.vars.map(v=>`<div class="eq-input-group"><label>${v.label}</label><input type="number" id="eqv-${idx}-${v.id}" placeholder="0" value="${v.def||''}" step="any"></div>`).join('');
    
    const delBtn = eq.custom ? `<button onclick="event.stopPropagation(); deleteEq(${idx})" style="background:none; border:none; color:var(--red); cursor:pointer; margin-left:1rem;" title="Excluir Fórmula"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>` : '';
    
    card.innerHTML=`
      <div class="eq-header" onclick="toggleEq(${idx})">
        <div style="flex: 1; min-width: 0;">
          <div class="eq-name">${eq.name}</div>
          <div class="eq-formula">${eq.formula}</div>
        </div>
        <div style="display:flex; align-items:center; gap:0.5rem; flex-shrink:0;">
          <div class="eq-chevron">▼</div>
          ${delBtn}
        </div>
      </div>
      <div class="eq-body">
        <div class="eq-inputs">${vars}</div>
        <button class="eq-calc-btn" onclick="calcEq(${idx})">Calcular</button>
        <div class="eq-result" id="eq-res-${idx}" style="display:none"></div>
      </div>`;
    list.appendChild(card);
  });
}

function toggleEq(idx){const c=document.getElementById('eq-'+idx);c.classList.toggle('open');}

function calcEq(idx){
  const eq=eqData[curEqCat][idx];
  const vals={};
  eq.vars.forEach(v=>{
    vals[v.id]=parseFloat(document.getElementById(``+`eqv-${idx}-${v.id}`).value);
    if(isNaN(vals[v.id])) vals[v.id] = 0;
  });
  
  let res;
  if (eq.custom) {
    try {
      const paramNames = Object.keys(vals);
      const paramValues = Object.values(vals);
      const fn = new Function(...paramNames, `return (${eq.expr});`);
      const calculatedValue = fn(...paramValues);
      res = `Resultado: ${calculatedValue}`;
    } catch(e) {
      res = `Erro na execução: Revise os operadores usados na fórmula.`;
    }
  } else {
    res = eq.calc(vals);
  }
  
  const r=document.getElementById('eq-res-'+idx);r.textContent=res;r.style.display='block';
}

function deleteEq(idx) {
  const eq = eqData[curEqCat][idx];
  if (!eq.custom) return;
  
  if(confirm(`Deseja realmente excluir a fórmula "${eq.name}"?`)) {
    let customEqs = loadLS('suite_custom_equations', []);
    customEqs = customEqs.filter(item => item.id !== eq.id);
    saveLS('suite_custom_equations', customEqs);
    initEq();
  }
}

function initEq() {
  initEqData();
  initEqCategories();
  renderEqs();
}

/* ════════════════════════════════════
   TAB SWITCHING
════════════════════════════════════ */
function switchPanel(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
}

// INICIALIZAÇÃO
initConv();
initEq();
</script>
