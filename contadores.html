<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contadores — POCKET</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--card2:#1f1f30;
  --accent:#ff3366; /* Rosa Néon para os Contadores */
  --accent-glow:rgba(255,51,102,0.4);
  --text:#f0f0f5;--muted:#8a8aab;--border:rgba(42,42,62,0.8);
  --btn:#22223a;--btn-h:#2e2e4a;--green:#00d4aa;--blue:#00a8ff;
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* Fundo Flutuante */
.bg-grid {position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;animation:float 10s ease-in-out infinite;}
.orb1{width:350px;height:350px;background:rgba(255,51,102,0.15);top:-50px;right:-100px;}
.orb2{width:400px;height:400px;background:rgba(124,107,255,0.08);bottom:-100px;left:-100px;animation-delay:-3s;}
@keyframes float {0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-30px) scale(1.05);}}

/* Ícones Globais */
.svg-icon{width:1.2rem;height:1.2rem;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* TOPBAR */
.topbar{background:rgba(18,18,26,0.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-shrink:0;z-index:200;}
.back{color:var(--muted);text-decoration:none;font-family:'Space Mono',monospace;font-size:.8rem;transition:color .2s;}
.back:hover{color:var(--accent);}
.topbar-title{font-weight:700;font-size:1.1rem;display:flex;align-items:center;gap:0.5rem;}
.topbar-title span{color:var(--accent);text-shadow:0 0 10px var(--accent-glow);}

/* TABS */
.tabs{display:flex;gap:.3rem;flex-wrap:wrap;margin-left:auto;}
.tab{padding:.4rem .9rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:.85rem;cursor:pointer;transition:all .3s ease;}
.tab.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;box-shadow:0 0 15px var(--accent-glow);}
.tab:hover:not(.active){background:var(--btn-h);color:var(--text);transform:translateY(-1px);}

/* MAIN LAYOUT */
.main{flex:1;display:flex;overflow:hidden;padding:1.5rem;z-index:10;max-width:1000px;margin:0 auto;width:100%;}
.panel{display:none;flex:1;overflow-y:auto;animation:fadeIn 0.4s ease-out forwards;flex-direction:column;gap:1.5rem;}
.panel.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}

/* ELEMENTOS GERAIS */
.form-input{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem;color:var(--text);font-family:'Space Mono',monospace;font-size:1rem;outline:none;width:100%;transition:all .3s;}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,51,102,0.15);}
.add-btn{background:linear-gradient(135deg, #ff3366, #ff0044);border:none;border-radius:10px;padding:.8rem 1.5rem;font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:#000;cursor:pointer;transition:all .2s cubic-bezier(0.34, 1.56, 0.64, 1);display:flex;align-items:center;justify-content:center;gap:0.5rem;box-shadow:0 6px 20px var(--accent-glow), inset 0 -3px 0 rgba(0,0,0,0.2);}
.add-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 10px 25px var(--accent-glow), inset 0 -3px 0 rgba(0,0,0,0.2);}
.add-btn:active{transform:translateY(2px);box-shadow:0 2px 10px var(--accent-glow), inset 0 0px 0 rgba(0,0,0,0.2);}

/* ────── CONTADORES (TAB 1) ────── */
.add-counter-bar{display:flex;gap:0.8rem;background:rgba(22,22,37,0.7);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:16px;padding:1rem;box-shadow:0 10px 30px rgba(0,0,0,0.2);}
.add-counter-bar .form-input{flex:1;}
.add-counter-bar .add-btn{width:auto;}

.counters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem;overflow-y:auto;padding-right:0.5rem;}
.counters-grid::-webkit-scrollbar{width:4px;}
.counters-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.counter-card{background:linear-gradient(145deg, rgba(28,28,46,0.9), rgba(20,20,30,0.9));border:1px solid var(--border);border-radius:20px;padding:1.5rem;display:flex;flex-direction:column;align-items:center;gap:1.2rem;box-shadow:0 8px 25px rgba(0,0,0,0.3);position:relative;transition:transform 0.2s;}
.counter-card:hover{transform:translateY(-3px);border-color:var(--muted);}
.counter-title{font-size:1.1rem;font-weight:700;color:var(--muted);text-align:center;width:100%;padding:0 2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.counter-val{font-family:'Space Mono',monospace;font-size:3.5rem;font-weight:800;color:var(--text);text-shadow:0 0 15px rgba(255,255,255,0.1);line-height:1;}
.counter-controls{display:flex;gap:1rem;width:100%;justify-content:center;align-items:center;}

.c-btn{width:56px;height:56px;border-radius:16px;border:none;background:var(--card2);color:var(--text);font-size:1.8rem;font-weight:700;font-family:'Space Mono',monospace;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);box-shadow:0 4px 10px rgba(0,0,0,0.2), inset 0 2px 0 rgba(255,255,255,0.05);}
.c-btn:hover{background:var(--btn-h);transform:scale(1.05);}
.c-btn:active{transform:scale(0.95);box-shadow:0 2px 5px rgba(0,0,0,0.2), inset 0 2px 0 rgba(0,0,0,0.1);}
.c-btn.plus{background:linear-gradient(135deg, #ff3366, #e60039);color:#000;box-shadow:0 6px 15px var(--accent-glow), inset 0 2px 0 rgba(255,255,255,0.2);}
.c-btn.plus:hover{box-shadow:0 8px 20px var(--accent-glow), inset 0 2px 0 rgba(255,255,255,0.2);}

.c-actions{position:absolute;top:1.2rem;width:100%;padding:0 1.2rem;display:flex;justify-content:space-between;pointer-events:none;}
.c-actions button{pointer-events:auto;background:none;border:none;color:var(--muted);cursor:pointer;padding:0.2rem;border-radius:6px;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.c-actions button:hover{color:var(--text);background:var(--btn-h);}
.c-actions button.del:hover{color:var(--red);background:rgba(255,68,102,0.1);}

/* ────── PLACAR DE JOGO (TAB 2) ────── */
.score-board{display:flex;flex-direction:column;gap:1.5rem;height:100%;}
.score-controls{display:flex;justify-content:space-between;align-items:center;background:var(--card);padding:1rem 1.5rem;border-radius:16px;border:1px solid var(--border);}
.score-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;flex:1;}
.score-card{background:linear-gradient(180deg, var(--card2) 0%, var(--card) 100%);border:2px solid var(--border);border-radius:24px;display:flex;flex-direction:column;align-items:center;padding:2rem 1.5rem;box-shadow:0 15px 35px rgba(0,0,0,0.3);position:relative;transition:all 0.3s;}
.score-card.winner{border-color:var(--accent);box-shadow:0 15px 35px var(--accent-glow), inset 0 0 30px rgba(255,51,102,0.1);}

.score-name{background:transparent;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;text-align:center;text-transform:uppercase;outline:none;width:100%;margin-bottom:1rem;transition:color 0.2s;}
.score-name:focus{color:var(--text);}
.score-val{font-family:'Space Mono',monospace;font-size:5rem;font-weight:800;color:var(--text);line-height:1;margin:1rem 0;text-shadow:0 5px 15px rgba(0,0,0,0.5);}

.score-btns{display:flex;gap:1rem;width:100%;}
.score-btns .c-btn{flex:1;height:70px;font-size:2.5rem;border-radius:20px;}
.score-del{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--muted);cursor:pointer;padding:0.4rem;border-radius:8px;transition:all 0.2s;}
.score-del:hover{color:var(--red);background:rgba(255,68,102,0.1);}

/* ────── MEDIDOR BPM (TAB 3) ────── */
.bpm-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:2rem;}
.bpm-display{width:220px;height:220px;border-radius:50%;background:var(--card);border:4px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 30px var(--accent-glow), inset 0 0 40px rgba(0,0,0,0.5);transition:all 0.1s;}
.bpm-display.beat{transform:scale(1.05);box-shadow:0 0 50px rgba(255,51,102,0.6), inset 0 0 20px rgba(255,51,102,0.3);}
.bpm-val{font-family:'Space Mono',monospace;font-size:4rem;font-weight:800;color:var(--text);line-height:1;}
.bpm-label{font-size:1rem;color:var(--accent);font-weight:700;letter-spacing:0.2em;}
.bpm-tap-btn{width:100%;max-width:400px;height:120px;background:var(--card2);border:2px dashed var(--muted);border-radius:24px;font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--muted);cursor:pointer;transition:all 0.1s;display:flex;align-items:center;justify-content:center;user-select:none;}
.bpm-tap-btn:active{background:rgba(255,51,102,0.1);border-color:var(--accent);color:var(--accent);transform:scale(0.98);}

</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="topbar">
  <a href="index.html" class="back">← POCKET</a>
  <div class="topbar-title">
    <svg class="svg-icon" viewBox="0 0 24 24" style="stroke:var(--accent);">
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
      <line x1="12" y1="8" x2="12" y2="16"></line>
      <line x1="8" y1="12" x2="16" y2="12"></line>
    </svg>
    <span>Contadores</span>
  </div>
  
  <div class="tabs">
    <button class="tab active" onclick="switchPanel('counters')">Cliques</button>
    <button class="tab" onclick="switchPanel('score')">Placar</button>
    <button class="tab" onclick="switchPanel('bpm')">Tap Tempo</button>
  </div>
</div>

<div class="main">

<div class="panel active" id="panel-counters">
  <div class="add-counter-bar">
    <input type="text" id="new-counter-title" class="form-input" placeholder="Novo contador (ex: Copos d'água)...">
    <button class="add-btn" onclick="addCounter()">
      <svg class="svg-icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Criar
    </button>
  </div>
  <div class="counters-grid" id="counters-grid"></div>
</div>

<div class="panel" id="panel-score">
  <div class="score-board">
    <div class="score-controls">
      <span style="font-size:0.9rem; color:var(--muted); font-family:'Space Mono',monospace;">Gestão de Partida</span>
      <div style="display:flex; gap:0.5rem;">
        <button class="add-btn" style="padding:0.6rem 1rem; font-size:0.85rem;" onclick="addPlayer()">+ Jogador</button>
        <button class="add-btn" style="padding:0.6rem 1rem; font-size:0.85rem; background:var(--card2); color:var(--text); box-shadow:none; border:1px solid var(--border);" onclick="resetAllScores()">Zerar Todos</button>
      </div>
    </div>
    <div class="score-grid" id="score-grid"></div>
  </div>
</div>

<div class="panel" id="panel-bpm">
  <div class="bpm-wrap">
    <div class="bpm-display" id="bpm-display">
      <div class="bpm-val" id="bpm-val">0</div>
      <div class="bpm-label">BPM</div>
    </div>
    <div style="text-align:center; color:var(--muted); font-size:0.9rem;">Toque no botão abaixo repetidamente no ritmo da batida.</div>
    <button class="bpm-tap-btn" id="tap-btn" onmousedown="registerTap()" ontouchstart="registerTap()">TAP</button>
    <button class="add-btn" style="background:var(--card2); color:var(--text); box-shadow:none; border:1px solid var(--border); max-width:200px;" onclick="resetBpm()">Zerar Medidor</button>
  </div>
</div>

</div>

<script>
/* Ícones Reutilizáveis */
const trashSVG = '<svg class="svg-icon" viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>';
const resetSVG = '<svg class="svg-icon" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>';

/* ════════════════ LOCAL STORAGE ════════════════ */
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function loadLS(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch(e){return def;}}

/* ════════════════ NAVEGAÇÃO ════════════════ */
function switchPanel(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
}

/* ════════════════ CONTADORES SIMPLES ════════════════ */
let counters = loadLS('suite_counters', [{id:1, title:'Exemplo: Água', val:0}]);

function addCounter() {
  const title = document.getElementById('new-counter-title').value.trim();
  if(!title) return;
  
  counters.unshift({ id: Date.now(), title: title, val: 0 });
  saveLS('suite_counters', counters);
  document.getElementById('new-counter-title').value = '';
  renderCounters();
}

function updateCounter(id, delta) {
  const c = counters.find(x => x.id === id);
  if(c) {
    c.val += delta;
    saveLS('suite_counters', counters);
    // Atualiza apenas o valor no DOM para não recarregar a lista toda
    document.getElementById(`c-val-${id}`).textContent = c.val;
  }
}

function resetCounter(id) {
  const c = counters.find(x => x.id === id);
  if(c) {
    c.val = 0;
    saveLS('suite_counters', counters);
    document.getElementById(`c-val-${id}`).textContent = 0;
  }
}

function deleteCounter(id) {
  counters = counters.filter(x => x.id !== id);
  saveLS('suite_counters', counters);
  renderCounters();
}

function renderCounters() {
  const grid = document.getElementById('counters-grid');
  if(counters.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:3rem;font-family:'Space Mono',monospace;">Nenhum contador criado.</div>`;
    return;
  }
  
  grid.innerHTML = counters.map(c => `
    <div class="counter-card">
      <div class="c-actions">
        <button onclick="resetCounter(${c.id})" title="Zerar">${resetSVG}</button>
        <button class="del" onclick="deleteCounter(${c.id})" title="Apagar">${trashSVG}</button>
      </div>
      <div class="counter-title" title="${c.title}">${c.title}</div>
      <div class="counter-val" id="c-val-${c.id}">${c.val}</div>
      <div class="counter-controls">
        <button class="c-btn" onclick="updateCounter(${c.id}, -1)">-</button>
        <button class="c-btn plus" onclick="updateCounter(${c.id}, 1)">+</button>
      </div>
    </div>
  `).join('');
}

/* ════════════════ PLACAR DE JOGO ════════════════ */
let scores = loadLS('suite_scores', [{id:1, name:'JOGADOR 1', val:20}, {id:2, name:'JOGADOR 2', val:20}]);

function addPlayer() {
  if(scores.length >= 8) { alert("Máximo de 8 jogadores."); return; }
  scores.push({ id: Date.now(), name: `JOGADOR ${scores.length + 1}`, val: 20 });
  saveLS('suite_scores', scores);
  renderScores();
}

function updateScore(id, delta) {
  const s = scores.find(x => x.id === id);
  if(s) {
    s.val += delta;
    saveLS('suite_scores', scores);
    document.getElementById(`s-val-${id}`).textContent = s.val;
  }
}

function renamePlayer(id, newName) {
  const s = scores.find(x => x.id === id);
  if(s) {
    s.name = newName;
    saveLS('suite_scores', scores);
  }
}

function deletePlayer(id) {
  scores = scores.filter(x => x.id !== id);
  saveLS('suite_scores', scores);
  renderScores();
}

function resetAllScores() {
  if(confirm("Zerar pontuação de todos os jogadores?")) {
    scores.forEach(s => s.val = 20); // Padrão RPG (pode ser 0)
    saveLS('suite_scores', scores);
    renderScores();
  }
}

function renderScores() {
  const grid = document.getElementById('score-grid');
  grid.innerHTML = scores.map(s => `
    <div class="score-card" id="s-card-${s.id}">
      <button class="score-del" onclick="deletePlayer(${s.id})" title="Remover Jogador">${trashSVG}</button>
      <input type="text" class="score-name" value="${s.name}" onchange="renamePlayer(${s.id}, this.value)">
      <div class="score-val" id="s-val-${s.id}">${s.val}</div>
      <div class="score-btns">
        <button class="c-btn" onclick="updateScore(${s.id}, -1)">-</button>
        <button class="c-btn plus" onclick="updateScore(${s.id}, 1)">+</button>
      </div>
    </div>
  `).join('');
}

/* ════════════════ MEDIDOR BPM (TAP TEMPO) ════════════════ */
let tapTimes = [];
let tapTimeout = null;

function registerTap() {
  const now = Date.now();
  const display = document.getElementById('bpm-display');
  
  // Animação visual do batimento
  display.classList.remove('beat');
  void display.offsetWidth; // Force reflow
  display.classList.add('beat');
  
  // Reseta se passar muito tempo desde o último tap (2 segundos)
  if (tapTimes.length > 0 && now - tapTimes[tapTimes.length - 1] > 2000) {
    tapTimes = [];
  }
  
  tapTimes.push(now);
  
  // Manter apenas as últimas 8 batidas para calcular a média
  if (tapTimes.length > 8) {
    tapTimes.shift();
  }
  
  if (tapTimes.length >= 2) {
    // Calcular intervalos
    let totalIntervals = 0;
    for (let i = 1; i < tapTimes.length; i++) {
      totalIntervals += (tapTimes[i] - tapTimes[i - 1]);
    }
    
    const averageInterval = totalIntervals / (tapTimes.length - 1);
    const bpm = Math.round(60000 / averageInterval);
    
    document.getElementById('bpm-val').textContent = bpm;
  }
  
  // Limpar a animação visual após um momento
  clearTimeout(tapTimeout);
  tapTimeout = setTimeout(() => {
    display.classList.remove('beat');
  }, 100);
}

function resetBpm() {
  tapTimes = [];
  document.getElementById('bpm-val').textContent = "0";
}

/* Inicializações */
renderCounters();
renderScores();

</script>
</body>
</html>
